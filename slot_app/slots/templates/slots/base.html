<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎰 スロット収支帳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --gold: #f5c842;
      --gold-dim: #a8872e;
      --green: #00e676;
      --green-dim: #00a152;
      --red: #ff3d5a;
      --red-dim: #b0002e;
      --text: #f0f0f8;
      --text-muted: #7070a0;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 100px;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left h1 {
      font-family: 'Zen Dots', cursive;
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(245,200,66,0.4);
    }
    .header-left p {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .user-name {
      font-size: 11px;
      color: var(--text-muted);
    }
    .user-name span {
      color: var(--gold);
      font-weight: 700;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    .btn-logout:active { opacity: 0.6; }
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }
    .nav a {
      flex: 1;
      text-decoration: none;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .nav a.active { color: var(--gold); }
    .nav a .icon { font-size: 24px; margin-bottom: 4px; }
    .page { padding: 20px 16px; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🎰 SLOT TRACKER</h1>
    <p>スロット収支管理アプリ</p>
  </div>
  <div class="header-right">
    <div class="user-name">👤 <span>{{ request.user.username }}</span></div>
    <form method="post" action="{% url 'logout' %}" style="margin:0">
      {% csrf_token %}
      <button type="submit" class="btn-logout">ログアウト</button>
    </form>
  </div>
</div>

{% block content %}{% endblock %}

<nav class="nav">
  <a href="{% url 'index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">
    <span class="icon">✏️</span>記録する
  </a>
  <a href="{% url 'total' %}" class="{% if request.resolver_match.url_name == 'total' %}active{% endif %}">
    <span class="icon">📊</span>累計
  </a>
</nav>

</body>
</html>
